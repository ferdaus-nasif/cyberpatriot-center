<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberPatriot Center</title>

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Background Music -->
  <audio id="bgMusic" loop>
    <source src="aquatic-ambience.mp3" type="audio/mpeg">
  </audio>

  <!-- Audio Controls -->
  <div class="audio-controls">
    <button class="audio-btn" id="playPauseBtn" title="Play/Pause">▶ Play</button>
    <button class="audio-btn" id="muteBtn" title="Mute/Unmute">🔊 Unmute</button>
  </div>

  <!-- Complete, lightweight lens glass structure -->
  <div class="lens-cursor" id="cursor" aria-hidden="true">
    <div class="loupe-viewport"></div>
  </div>


  <header>
    <a href="index.html" class="brand" style="text-decoration: none;">
      <img src="logo.png" alt="Logo" class="brand-logo">
      CyberPatriot Center
    </a>
    
    <nav class="desktop-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="onboarding.html">New Team Onboarding</a></li>
        <li><a href="peshrow.html">Peshrow's Page</a></li>
        <li><a href="archives.html">Scores Archives</a></li>
        <li><a href="resources.html">Resources</a></li>
      </ul>
    </nav>
    <button class="menu-toggle" id="menuToggle" aria-label="Open Menu">☰</button>
  </header>


   <!-- Sliding Sidebar for mobile -->
  <div class="sidebar-nav" id="sidebarMenu">
    <button class="close-btn" id="closeMenu">✕</button>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="onboarding.html">New Team Onboarding</a></li>
      <li><a href="peshrow.html">Peshrow's Page</a></li>
      <li><a href="archives.html">Archives</a></li>
      <li><a href="resources.html">Resources</a></li>
    </ul>
  </div>

  <section class="hero">
    <h1>
      <span>CyberPatriot</span>
      <span>Center</span>
    </h1>
    <div class="arrow-down" id="scrollDown">⌃</div>
  </section>

  <div class="announcement-bar">
    CYBERPATRIOT 19 (UNDER CONSTRUCTION)
  </div>

  <section class="countdown-section">
    <div class="countdown-title">COUNTDOWN TO CYBERPATRIOT ROUND 1 (OCT. 24, 2026)</div>
    <div class="timer-container" id="live-countdown">---</div>
  </section>

  <!-- Schedule Image Section -->
  <section class="info-image-section">
    <img src="CP19-COMPETITION-SCHEDULE-HERO.png" alt="CyberPatriot 19 Schedule" class="info-graphic">
  </section>

  <script>
    const targetDate = new Date("2026-10-24T09:00:00").getTime();

    const x = setInterval(function() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("live-countdown").innerHTML = 
        `<span class="num">${days}</span><span class="lbl">d</span>` +
        `<span class="num">${hours}</span><span class="lbl">h</span>` +
        `<span class="num">${minutes}</span><span class="lbl">m</span>` +
        `<span class="num">${seconds}</span><span class="lbl">s</span>`;

      if (distance < 0) {
        clearInterval(x);
        document.getElementById("live-countdown").innerHTML = "<span class='lbl'>Round 1 is Live</span>";
      }
    }, 1000);

    // Sidebar open and close
    const menuToggle = document.getElementById('menuToggle');
    const closeMenu = document.getElementById('closeMenu');
    const sidebarMenu = document.getElementById('sidebarMenu');

    menuToggle.addEventListener('click', () => {
      sidebarMenu.classList.add('active');
    });

    closeMenu.addEventListener('click', () => {
      sidebarMenu.classList.remove('active');
    });

    // Scroll down on carrot click
    const scrollDown = document.getElementById('scrollDown');
    scrollDown.addEventListener('click', () => {
      window.scrollBy({ top: window.innerHeight * 0.8, behavior: 'smooth' });
    });

    const mainCursor = document.getElementById('cursor');

    // Slides the lens shell layout perfectly alongside your raw screen mouse input values
    window.addEventListener('mousemove', (e) => {
      mainCursor.style.left = `${e.clientX}px`;
      mainCursor.style.top = `${e.clientY}px`;
    });

    // Manages link hover expansion states cleanly
    document.querySelectorAll('a, button, .arrow-down').forEach(interactiveItem => {
      interactiveItem.addEventListener('mouseenter', () => mainCursor.classList.add('hovering'));
      interactiveItem.addEventListener('mouseleave', () => mainCursor.classList.remove('hovering'));
    });

    // Unmute background music on first user interaction
    const bgMusic = document.getElementById('bgMusic');
    const unmuteAudio = () => {
      bgMusic.muted = false;
      document.removeEventListener('click', unmuteAudio);
      document.removeEventListener('keydown', unmuteAudio);
    };
    document.addEventListener('click', unmuteAudio);
    document.addEventListener('keydown', unmuteAudio);

    // Audio control buttons
    const playPauseBtn = document.getElementById('playPauseBtn');
    const muteBtn = document.getElementById('muteBtn');

    playPauseBtn.addEventListener('click', () => {
      if (bgMusic.paused) {
        bgMusic.play();
        playPauseBtn.textContent = '⏸ Pause';
        bgMusic.muted = false;
      } else {
        bgMusic.pause();
        playPauseBtn.textContent = '▶ Play';
      }
    });

    muteBtn.addEventListener('click', () => {
      bgMusic.muted = !bgMusic.muted;
      muteBtn.textContent = bgMusic.muted ? '🔇 Muted' : '🔊 Unmute';
      muteBtn.classList.toggle('active', bgMusic.muted);
    });

    // Persist audio playback state across page navigation
    const saveAudioState = () => {
      sessionStorage.setItem('audioTime', bgMusic.currentTime);
      sessionStorage.setItem('audioMuted', bgMusic.muted);
      sessionStorage.setItem('audioPaused', bgMusic.paused);
    };

    const restoreAudioState = () => {
      const savedTime = sessionStorage.getItem('audioTime');
      const savedMuted = sessionStorage.getItem('audioMuted');
      const savedPaused = sessionStorage.getItem('audioPaused');
      
      // Only restore if we have saved state (returning from another page)
      if (savedTime !== null) {
        bgMusic.currentTime = parseFloat(savedTime);
        bgMusic.muted = savedMuted === 'true';
        
        // Only play if it was playing before
        if (savedPaused === 'false') {
          bgMusic.play().catch(err => console.log('Autoplay prevented:', err));
          playPauseBtn.textContent = '⏸ Pause';
        } else {
          bgMusic.pause();
          playPauseBtn.textContent = '▶ Play';
        }
        muteBtn.textContent = bgMusic.muted ? '🔇 Muted' : '🔊 Unmute';
        muteBtn.classList.toggle('active', bgMusic.muted);
      }
    };

    // Restore audio state immediately and on load
    restoreAudioState();
    window.addEventListener('load', restoreAudioState);
    window.addEventListener('beforeunload', saveAudioState);
    bgMusic.addEventListener('timeupdate', saveAudioState);

  </script>

</body>
</html>
