<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberPatriot Center</title>

  <!-- Injects your custom icon file straight into the browser tab -->
  <link rel="icon" type="image/png" href="favicon.png">

  <style>

    /* 1. Normal/Regular Weight Asset */
    @font-face {
      font-family: 'UnboundedNormal';
      src: url('unbounded.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    /* 2. NEW: Semi-Bold (600) Weight Asset */
    @font-face {
      font-family: 'UnboundedSemiBold';
      src: url('unbounded-semibold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    /* 3. Extra-Chunky Black (900) Weight Asset */
    @font-face {
      font-family: 'UnboundedBlack';
      src: url('unbounded-black.woff2') format('woff2');
      font-weight: 900;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Forces the entire window to glide smoothly when clicking link anchors */
html {
  scroll-behavior: smooth;
}


    body {
      font-family: 'UnboundedNormal', sans-serif;
      background-color: #0d1117;
      color: #ffffff;
      overflow-x: hidden;
    }

    /* Header Navigation Bar styling */
    header {
      background-color: rgba(13, 17, 23, 0.9);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 2.5rem;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'UnboundedNormal', sans-serif;
      font-weight: 400;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
    }

    .brand-logo {
      width: 32px;
      height: 32px;
      object-fit: contain;
      border-radius: 50%;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 1.5rem;
      align-items: center;
    }
    
/* Header navigation link settings - Configured to Semi-Bold */
nav a {
  color: #ffffff;
  text-decoration: none;
  font-size: 0.85rem;
  /* 1. Forces the navigation bar links to pull the 600 Semi-Bold font asset */
  font-family: 'UnboundedSemiBold', sans-serif !important;
  font-weight: 600 !important; 
  transition: opacity 0.2s, color 0.2s;
}

nav a:hover {
  opacity: 0.7;
  color: #00a2ff;
}

/* Header brand text area - Configured to Semi-Bold */
.brand {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  /* 2. Forces the logo brand title text to match the 600 Semi-Bold look */
  font-family: 'UnboundedSemiBold', sans-serif !important;
  font-weight: 600 !important;
  font-size: 1.1rem;
  letter-spacing: -0.02em;
}

    /* Hero Section with solid teal backdrop */
    .hero {
      height: 75vh;
      background: radial-gradient(circle at center, #116979 0%, #0d1117 70%); 
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding-top: 5rem;
    position: relative;
    }

    /* Keeps your primary logo banner at the absolute maximum chunky thickness */
    .hero h1 {
      font-family: 'UnboundedBlack', sans-serif !important;
      font-weight: 800; 
      font-size: 5.5rem; 
      letter-spacing: 0.01em; 
      line-height: 0.95; 
      text-align: center;
      -webkit-text-stroke: 1px #ffffff;
      text-stroke: 1px #ffffff;
    }

    .hero h1 span {
      display: block;
    }

    .arrow-down {
      position: absolute;
      bottom: 2rem;
      font-size: 1.5rem;
      color: rgba(255,255,255,0.4);
    }

    /* Middle Banner Text Stripe - Configured to 600 weight */
    .announcement-bar {
      background-color: #00a2ff;
      color: #000000;
      font-family: 'UnboundedSemiBold', sans-serif !important;
      font-weight: 600; 
      font-size: 1.3rem;
      letter-spacing: 0.02em;
      padding: 2.2rem;
      text-align: center;
    }

    /* Dark Countdown Footer Layer */
    .countdown-section {
      background-color: #000000;
      padding: 5rem 2rem;
      text-align: center;
    }

    /* Section Header Title - Configured to 600 weight */
    .countdown-title {
      font-family: 'UnboundedSemiBold', sans-serif !important;
      font-size: 1.8rem;
      font-weight: 600; 
      margin-bottom: 2.5rem;
      color: rgba(255, 255, 255, 0.9);
      letter-spacing: -0.01em;
    }

    /* Countdown alignment matrix wrapper */
    .timer-container {
      display: flex;
      justify-content: center;
      align-items: baseline;
      gap: 0.2rem;
    }

    /* Countdown Numbers - Configured to 600 weight with gradient mask */
    .num {
      font-family: 'UnboundedSemiBold', sans-serif !important;
      font-weight: 600;
      font-size: 3.8rem;
      letter-spacing: -0.03em;
      background: linear-gradient(90deg, #00a2ff 0%, #0077ff 60%, #0044cc 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-fill-color: transparent;
    }
    
    /* Countdown Alphabetical Labels - Configured to 600 weight */
    .lbl {
      font-family: 'UnboundedSemiBold', sans-serif !important;
      font-weight: 600;
      font-size: 2.2rem;
      color: rgba(255, 255, 255, 0.7) !important;
      -webkit-text-fill-color: rgba(255, 255, 255, 0.7) !important;
      margin-right: 1.2rem;
    }

    /* Mobile handling safety net rendering profiles */
    @media (max-width: 900px) {
      .hero h1 { font-size: 3rem; letter-spacing: -0.04em; -webkit-text-stroke: 1px #ffffff; }
      .num { font-size: 2.2rem; }
      .lbl { font-size: 1.4rem; margin-right: 0.6rem; }
      nav { display: none; } 
    }

    /* Smoothly glides the main header text up and fades it in on launch */
.hero h1 {
  animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(25px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
    /* Mobile Toggle Button Styling Hidden on Desktop */
    .menu-toggle {
      display: none;
      background: none;
      border: none;
      color: #ffffff;
      font-size: 2rem;
      cursor: pointer;
    }

    /* Fixed Sidebar Menu Architecture */
    .sidebar-nav {
      position: fixed;
      top: 0;
      right: -280px; /* Hidden offscreen by default */
      width: 280px;
      height: 100vh;
      background-color: #131a26;
      border-left: 1px solid #1e293b;
      padding: 2.5rem;
      z-index: 2000;
      /* Smooth slide transition */
      transition: right 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
    }

    /* Active helper state to pop slide sidebar in */
    .sidebar-nav.active {
      right: 0;
    }

    .close-btn {
      background: none;
      border: none;
      color: #ffffff;
      font-size: 1.5rem;
      cursor: pointer;
      float: right;
      margin-bottom: 2rem;
    }

    .sidebar-nav ul {
      list-style: none;
      margin-top: 4rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .sidebar-nav a {
      color: #ffffff;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* Responsive media settings for Mobile screens */
    @media (max-width: 900px) {
      .desktop-nav { display: none !important; } /* Replaces old nav hider line */
      .menu-toggle { display: block; } /* Displays hamburger bars on phones */
    }

    /* Container section for CP19 Schedule */
.info-image-section {
  background-color: #0d1117; /* Matches your body dark background */
  padding: 4rem 2rem;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Controls the scale and responsiveness of the image */
.info-graphic {
  max-width: 100%;
  width: 800px; /* Adjust this number to make the image wider or narrower */
  height: auto;
  border-radius: 12px; /* Smooths out the image corners */
  border: 1px solid #1e293b; /* Subtle dark border border framing */
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4); /* Elevates it off the background */
}

  </style>
</head>
<body>

   <header>
    <div class="brand">
      <!-- Changed from a generic div to a live image tag linking to your logo -->
      <img src="logo.png" alt="CyberPatriot Logo" class="brand-logo">
      CyberPatriot Center
    </div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="onboarding.html">New Team Onboarding</a></li>
        <li><a href="peshrow.html">Peshrow's Page</a></li>
        <li><a href="archives.html">Scores Archives</a></li>
        <li><a href="resources.html">Resources</a></li>
      </ul>
    </nav>

    <!-- Mobile Menu Toggle Button -->
     <button class="menu-toggle" id="menuToggle" aria-label="Open Menu">☰</button>
  </header>

   <!-- Sliding Sidebar for Phones -->
  <div class="sidebar-nav" id="sidebarMenu">
    <button class="close-btn" id="closeMenu">✕</button>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="onboarding.html">Onboarding</a></li>
      <li><a href="peshrow.html">Peshrow</a></li>
      <li><a href="archives.html">Archives</a></li>
      <li><a href="resources.html">Resources</a></li>
    </ul>
  </div>

  <section class="hero">
    <h1>
      <span>CyberPatriot</span>
      <span>Center</span>
    </h1>
    <div class="arrow-down">⌃</div>
  </section>

  <div class="announcement-bar">
    CYBERPATRIOT 19 (UNDER CONSTRUCTION)
  </div>

  <section class="countdown-section">
    <div class="countdown-title">COUNTDOWN TO CYBERPATRIOT ROUND 1</div>
    <div class="timer-container" id="live-countdown">---</div>
  </section>

  <!-- NEW: Schedule Image Section -->
  <section class="info-image-section">
    <img src="CP19-COMPETITION-SCHEDULE-HERO.png" alt="CyberPatriot 19 Schedule" class="info-graphic">
  </section>

  <script>
    const targetDate = new Date("2026-10-24T09:00:00").getTime();

    const x = setInterval(function() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("live-countdown").innerHTML = 
        `<span class="num">${days}</span><span class="lbl">d</span>` +
        `<span class="num">${hours}</span><span class="lbl">h</span>` +
        `<span class="num">${minutes}</span><span class="lbl">m</span>` +
        `<span class="num">${seconds}</span><span class="lbl">s</span>`;

      if (distance < 0) {
        clearInterval(x);
        document.getElementById("live-countdown").innerHTML = "<span class='lbl'>Round 1 is Live</span>";
      }
    }, 1000);

        // Sidebar open and close interaction engines
    const menuToggle = document.getElementById('menuToggle');
    const closeMenu = document.getElementById('closeMenu');
    const sidebarMenu = document.getElementById('sidebarMenu');

    menuToggle.addEventListener('click', () => {
      sidebarMenu.classList.add('active');
    });

    closeMenu.addEventListener('click', () => {
      sidebarMenu.classList.remove('active');
    });

  </script>

</body>
</html>
