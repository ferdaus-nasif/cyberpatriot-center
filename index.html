<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberPatriot Center</title>

  <link rel="icon" type="image/png" href="favicon.png">

  <style>

    /* Unbounded normal font */
    @font-face {
      font-family: 'UnboundedNormal';
      src: url('unbounded.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    /* Unbounded semibold font */
    @font-face {
      font-family: 'UnboundedSemiBold';
      src: url('unbounded-semibold.woff2') format('woff2');
      font-weight: 600;
      font-style: normal;
      font-display: swap;
    }

    /* Unbounded black font */
    @font-face {
      font-family: 'UnboundedBlack';
      src: url('unbounded-black.woff2') format('woff2');
      font-weight: 900;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Smooth transition */
html {
  scroll-behavior: smooth;
}


    body {
      font-family: 'UnboundedNormal', sans-serif;
      background-color: #0d1117;
      color: #ffffff;
      overflow-x: hidden;
    }

    /* Header Navigation Bar */
    header {
      background-color: rgba(13, 17, 23, 0.9);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 2.5rem;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
    }

    .brand {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-family: 'UnboundedSemiBold', sans-serif !important;
    font-weight: 600 !important;
    font-size: 1.1rem;
    letter-spacing: -0.02em;
    color: #ffffff !important; 
    text-decoration: none !important;
    }

    .brand-logo {
      width: 32px;
      height: 32px;
      object-fit: contain;
      border-radius: 50%;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 1.5rem;
      align-items: center;
    }
    
/* Header navigation link settings */
nav a {
  color: #ffffff;
  text-decoration: none;
  font-size: 0.85rem;
  font-family: 'UnboundedSemiBold', sans-serif !important;
  font-weight: 600 !important; 
  transition: opacity 0.2s, color 0.2s;
}

nav a:hover {
  opacity: 0.7;
  color: #00a2ff;
}

/* Header brand text area */
.brand {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-family: 'UnboundedSemiBold', sans-serif !important;
  font-weight: 600 !important;
  font-size: 1.1rem;
  letter-spacing: -0.02em;
}

    /* Hero Section */
    .hero {
      height: 75vh;
      background: radial-gradient(circle at center, #116979 0%, #0d1117 70%); 
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding-top: 5rem;
    position: relative;
    }

    /* Hero Text */
    .hero h1 {
      font-family: 'UnboundedBlack', sans-serif !important;
      font-weight: 800; 
      font-size: 5.5rem; 
      letter-spacing: 0.01em; 
      line-height: 0.95; 
      text-align: center;
      -webkit-text-stroke: 1px #ffffff;
      text-stroke: 1px #ffffff;
    }

    .hero h1 span {
      display: block;
    }

    .arrow-down {
      position: absolute;
      bottom: 2rem;
      font-size: 1.5rem;
      color: rgba(255,255,255,0.4);
    }

    /* Middle Banner Text */
    .announcement-bar {
      background-color: #00a2ff;
      color: #000000;
      font-family: 'UnboundedSemiBold', sans-serif !important;
      font-weight: 600; 
      font-size: 1.3rem;
      letter-spacing: 0.02em;
      padding: 2.2rem;
      text-align: center;
    }

    /* Dark Countdown Section */
    .countdown-section {
      background-color: #000000;
      padding: 5rem 2rem;
      text-align: center;
    }

    /* Countdown Title */
    .countdown-title {
      font-family: 'UnboundedSemiBold', sans-serif !important;
      font-size: 1.8rem;
      font-weight: 600; 
      margin-bottom: 2.5rem;
      color: rgba(255, 255, 255, 0.9);
      letter-spacing: -0.01em;
    }

    /* Countdown alignment */
    .timer-container {
      display: flex;
      justify-content: center;
      align-items: baseline;
      gap: 0.2rem;
    }

    /* Countdown Numbers */
    .num {
      font-family: 'UnboundedSemiBold', sans-serif !important;
      font-weight: 600;
      font-size: 3.8rem;
      letter-spacing: -0.03em;
      background: linear-gradient(90deg, #00a2ff 0%, #0077ff 60%, #0044cc 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-fill-color: transparent;
    }
    
    /* Countdown Labels */
    .lbl {
      font-family: 'UnboundedSemiBold', sans-serif !important;
      font-weight: 600;
      font-size: 2.2rem;
      color: rgba(255, 255, 255, 0.7) !important;
      -webkit-text-fill-color: rgba(255, 255, 255, 0.7) !important;
      margin-right: 1.2rem;
    }

    /* Mobile handling */
    @media (max-width: 900px) {
      .hero h1 { font-size: 3rem; letter-spacing: -0.04em; -webkit-text-stroke: 1px #ffffff; }
      .num { font-size: 2.2rem; }
      .lbl { font-size: 1.4rem; margin-right: 0.6rem; }
      nav { display: none; } 
    }

    /* Smooth transition */
.hero h1 {
  animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(25px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
    /* Mobile Toggle Button */
    .menu-toggle {
      display: none;
      background: none;
      border: none;
      color: #ffffff;
      font-size: 2rem;
      cursor: pointer;
    }

    /* Fixed Sidebar Menu */
    .sidebar-nav {
      position: fixed;
      top: 0;
      right: -280px;
      width: 280px;
      height: 100vh;
      background-color: #131a26;
      border-left: 1px solid #1e293b;
      padding: 2.5rem;
      z-index: 2000;
      transition: right 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
    }

    /* Sidebar helper */
    .sidebar-nav.active {
      right: 0;
    }

    .close-btn {
      background: none;
      border: none;
      color: #ffffff;
      font-size: 1.5rem;
      cursor: pointer;
      float: right;
      margin-bottom: 2rem;
    }

    .sidebar-nav ul {
      list-style: none;
      margin-top: 4rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .sidebar-nav a {
      color: #ffffff;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
    }

    /* Responsive settings for mobile */
    @media (max-width: 900px) {
      .desktop-nav { display: none !important; }
      .menu-toggle { display: block; }
    }

    /* Container section for CP19 Schedule */
.info-image-section {
  background-color: #0d1117;
  padding: 4rem 2rem;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Scale control for image */
.info-graphic {
  max-width: 100%;
  width: 800px;
  border-radius: 12px;
  border: 1px solid #1e293b;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
}
/* 1. Universal custom pointer rule setup */
html, body, a, button, input {
  cursor: none !important;
}

:root {
  --bg: #0d1117;
  --text: #ffffff;
  --body: 'UnboundedNormal', sans-serif;
}

/* 2. Your core premium lens glass frame layout */
.lens-cursor { 
  position: fixed; 
  pointer-events: none; 
  z-index: 99999; 
  width: 44px; 
  height: 44px; 
  border-radius: 50%; 
  background: transparent; 
  border: 2.5px solid rgba(255, 255, 255, 0.32); 
  box-shadow: inset 0 -3px 6px rgba(0, 0, 0, 0.15), inset 0 0 8px 2px rgba(255, 255, 255, 0.04), 0 0 0 1px rgba(255, 255, 255, 0.1), 0 6px 20px rgba(0, 0, 0, 0.4), 0 2px 6px rgba(0, 0, 0, 0.25), 0 0 12px rgba(94, 184, 255, 0.04); 
  transform: translate(-50%, -50%); 
  /* Ultra-smooth layout transitions for scale adjustments */
  transition: width 0.35s cubic-bezier(0.22, 1, 0.36, 1), height 0.35s cubic-bezier(0.22, 1, 0.36, 1), border-color 0.3s, box-shadow 0.3s; 
} 

/* 3. FIX: Viewport uses backdrop filters to simulate lens depth magnification */
.loupe-viewport { 
  position: absolute; 
  inset: 0; 
  border-radius: 50%; 
  overflow: hidden; 
  z-index: 0;
  /* Scales anything beneath the ring to 1.12x size without breaking page links */
  backdrop-filter: scale(1.12) brightness(1.05);
  -webkit-backdrop-filter: scale(1.12) brightness(1.05);
} 

/* Bottom droplet light reflection caustic asset layer */
.lens-cursor::after { 
  content: ''; 
  position: absolute; 
  bottom: -5px; 
  left: 50%; 
  transform: translateX(-50%); 
  width: 50%; 
  height: 5px; 
  border-radius: 50%; 
  background: radial-gradient(ellipse, rgba(94, 184, 255, 0.12) 0%, transparent 100%); 
  pointer-events: none; 
  z-index: 3; 
} 

/* Hover state panel link expand profiles */
.lens-cursor.hovering { 
  width: 60px; 
  height: 60px; 
  border-width: 3px; 
  border-color: rgba(255, 255, 255, 0.42); 
  box-shadow: inset 0 -4px 10px rgba(0, 0, 0, 0.18), inset 0 0 10px 3px rgba(255, 255, 255, 0.05), 0 0 0 1.5px rgba(255, 255, 255, 0.14), 0 8px 28px rgba(0, 0, 0, 0.45), 0 3px 8px rgba(0, 0, 0, 0.3), 0 0 18px rgba(94, 184, 255, 0.06); 
} 

a, button, .btn-glass, .jelly-dot, .proj-card { cursor: none !important; } 

@media (hover: none) { 
  .lens-cursor { display: none; } 
  body, a, button, .btn-glass, .jelly-dot, .proj-card { cursor: auto !important; } 
}

  </style>
</head>
<body>
  <!-- Complete, lightweight lens glass structure -->
  <div class="lens-cursor" id="cursor" aria-hidden="true">
    <div class="loupe-viewport"></div>
  </div>


  <header>
    <a href="index.html" class="brand" style="text-decoration: none;">
      <img src="logo.png" alt="Logo" class="brand-logo">
      CyberPatriot Center
    </a>
    
    <nav class="desktop-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="onboarding.html">New Team Onboarding</a></li>
        <li><a href="peshrow.html">Peshrow's Page</a></li>
        <li><a href="archives.html">Scores Archives</a></li>
        <li><a href="resources.html">Resources</a></li>
      </ul>
    </nav>
    <button class="menu-toggle" id="menuToggle" aria-label="Open Menu">☰</button>
  </header>


   <!-- Sliding Sidebar for mobile -->
  <div class="sidebar-nav" id="sidebarMenu">
    <button class="close-btn" id="closeMenu">✕</button>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="onboarding.html">New Team Onboarding</a></li>
      <li><a href="peshrow.html">Peshrow's Page</a></li>
      <li><a href="archives.html">Archives</a></li>
      <li><a href="resources.html">Resources</a></li>
    </ul>
  </div>

  <section class="hero">
    <h1>
      <span>CyberPatriot</span>
      <span>Center</span>
    </h1>
    <div class="arrow-down">⌃</div>
  </section>

  <div class="announcement-bar">
    CYBERPATRIOT 19 (UNDER CONSTRUCTION)
  </div>

  <section class="countdown-section">
    <div class="countdown-title">COUNTDOWN TO CYBERPATRIOT ROUND 1</div>
    <div class="timer-container" id="live-countdown">---</div>
  </section>

  <!-- Schedule Image Section -->
  <section class="info-image-section">
    <img src="CP19-COMPETITION-SCHEDULE-HERO.png" alt="CyberPatriot 19 Schedule" class="info-graphic">
  </section>

  <script>
    const targetDate = new Date("2026-10-24T09:00:00").getTime();

    const x = setInterval(function() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("live-countdown").innerHTML = 
        `<span class="num">${days}</span><span class="lbl">d</span>` +
        `<span class="num">${hours}</span><span class="lbl">h</span>` +
        `<span class="num">${minutes}</span><span class="lbl">m</span>` +
        `<span class="num">${seconds}</span><span class="lbl">s</span>`;

      if (distance < 0) {
        clearInterval(x);
        document.getElementById("live-countdown").innerHTML = "<span class='lbl'>Round 1 is Live</span>";
      }
    }, 1000);

        // Sidebar open and close
    const menuToggle = document.getElementById('menuToggle');
    const closeMenu = document.getElementById('closeMenu');
    const sidebarMenu = document.getElementById('sidebarMenu');

    menuToggle.addEventListener('click', () => {
      sidebarMenu.classList.add('active');
    });

    closeMenu.addEventListener('click', () => {
      sidebarMenu.classList.remove('active');
    });
    
    const mainCursor = document.getElementById('cursor');

    // Slides the lens shell layout perfectly alongside your raw screen mouse input values
    window.addEventListener('mousemove', (e) => {
      mainCursor.style.left = `${e.clientX}px`;
      mainCursor.style.top = `${e.clientY}px`;
    });

    // Manages link hover expansion states cleanly
    document.querySelectorAll('a, button').forEach(interactiveItem => {
      interactiveItem.addEventListener('mouseenter', () => mainCursor.classList.add('hovering'));
      interactiveItem.addEventListener('mouseleave', () => mainCursor.classList.remove('hovering'));
    });

  </script>

</body>
</html>
