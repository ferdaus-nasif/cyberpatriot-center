<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CyberPatriot Center</title>

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Complete, lightweight lens glass structure -->
  <div class="lens-cursor" id="cursor" aria-hidden="true">
    <div class="loupe-viewport"></div>
  </div>


  <header>
    <a href="index.html" class="brand" style="text-decoration: none;">
      <img src="logo.png" alt="Logo" class="brand-logo">
      CyberPatriot Center
    </a>
    
    <nav class="desktop-nav">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="onboarding.html">New Team Onboarding</a></li>
        <li><a href="peshrow.html">Peshrow's Page</a></li>
        <li><a href="archives.html">Scores Archives</a></li>
        <li><a href="resources.html">Resources</a></li>
      </ul>
    </nav>
    <button class="menu-toggle" id="menuToggle" aria-label="Open Menu">☰</button>
  </header>


   <!-- Sliding Sidebar for mobile -->
  <div class="sidebar-nav" id="sidebarMenu">
    <button class="close-btn" id="closeMenu">✕</button>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="onboarding.html">New Team Onboarding</a></li>
      <li><a href="peshrow.html">Peshrow's Page</a></li>
      <li><a href="archives.html">Archives</a></li>
      <li><a href="resources.html">Resources</a></li>
    </ul>
  </div>

  <section class="hero">
    <h1>
      <span>CyberPatriot</span>
      <span>Center</span>
    </h1>
    <div class="arrow-down">⌃</div>
  </section>

  <div class="announcement-bar">
    CYBERPATRIOT 19 (UNDER CONSTRUCTION)
  </div>

  <section class="countdown-section">
    <div class="countdown-title">COUNTDOWN TO CYBERPATRIOT ROUND 1 (OCT. 24, 2026)</div>
    <div class="timer-container" id="live-countdown">---</div>
  </section>

  <!-- Schedule Image Section -->
  <section class="info-image-section">
    <img src="CP19-COMPETITION-SCHEDULE-HERO.png" alt="CyberPatriot 19 Schedule" class="info-graphic">
  </section>

  <script>
    const targetDate = new Date("2026-10-24T09:00:00").getTime();

    const x = setInterval(function() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("live-countdown").innerHTML = 
        `<span class="num">${days}</span><span class="lbl">d</span>` +
        `<span class="num">${hours}</span><span class="lbl">h</span>` +
        `<span class="num">${minutes}</span><span class="lbl">m</span>` +
        `<span class="num">${seconds}</span><span class="lbl">s</span>`;

      if (distance < 0) {
        clearInterval(x);
        document.getElementById("live-countdown").innerHTML = "<span class='lbl'>Round 1 is Live</span>";
      }
    }, 1000);

        // Sidebar open and close
    const menuToggle = document.getElementById('menuToggle');
    const closeMenu = document.getElementById('closeMenu');
    const sidebarMenu = document.getElementById('sidebarMenu');

    menuToggle.addEventListener('click', () => {
      sidebarMenu.classList.add('active');
    });

    closeMenu.addEventListener('click', () => {
      sidebarMenu.classList.remove('active');
    });

    const mainCursor = document.getElementById('cursor');

    // Slides the lens shell layout perfectly alongside your raw screen mouse input values
    window.addEventListener('mousemove', (e) => {
      mainCursor.style.left = `${e.clientX}px`;
      mainCursor.style.top = `${e.clientY}px`;
    });

    // Manages link hover expansion states cleanly
    document.querySelectorAll('a, button').forEach(interactiveItem => {
      interactiveItem.addEventListener('mouseenter', () => mainCursor.classList.add('hovering'));
      interactiveItem.addEventListener('mouseleave', () => mainCursor.classList.remove('hovering'));
    });

  </script>

</body>
</html>
